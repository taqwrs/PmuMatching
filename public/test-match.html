<!DOCTYPE html>
<html>
<body style="font-family:sans-serif; padding:20px; max-width:700px;">
  <h3>ทดสอบ AI Matching</h3>

  <label>ชื่อโครงการ (ไม่บังคับ)</label><br>
  <input id="title" style="width:100%; padding:8px; margin-bottom:12px;"
    placeholder="เช่น โครงการพัฒนา AI เพื่อการเกษตร"/><br>

  <label>Abstract โครงการวิจัย</label><br>
  <textarea id="abstract" style="width:100%; height:200px; padding:8px; margin-bottom:12px;"
    placeholder="วาง abstract หรือบทคัดย่อโครงการที่นี่..."></textarea><br>

  <button onclick="match()"
    style="padding:10px 24px; background:#0284c7; color:white; border:none; border-radius:6px; cursor:pointer;">
    วิเคราะห์ความเหมาะสม
  </button>

  <div id="result" style="margin-top:20px;"></div>

  <script>
    async function match() {
      const abstract = document.getElementById('abstract').value
      const proposalTitle = document.getElementById('title').value

      if (!abstract) {
        alert('กรุณาใส่ abstract ก่อนครับ')
        return
      }

      document.getElementById('result').innerHTML = '<p>กำลังวิเคราะห์...</p>'

      const res = await fetch('/api/match', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ abstract, proposalTitle })
      })
      const data = await res.json()

      if (!data.success) {
        document.getElementById('result').innerHTML = `<p style="color:red">${data.error}</p>`
        return
      }

      const html = data.results.map(r => `
        <div style="border:1px solid #e2e8f0; border-radius:8px; padding:16px; margin-bottom:12px;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <b>${r.funding_name}</b>
            <span style="font-size:1.4rem; font-weight:bold; color:${r.score >= 70 ? '#16a34a' : r.score >= 40 ? '#d97706' : '#dc2626'}">
              ${r.score}%
            </span>
          </div>
          <p style="color:#16a34a; margin:8px 0 4px;"><b>เหมาะสม:</b> ${r.reason_match}</p>
          <p style="color:#dc2626; margin:4px 0;"><b>ข้อจำกัด:</b> ${r.reason_mismatch}</p>
        </div>
      `).join('')

      document.getElementById('result').innerHTML = html
    }
  </script>
</body>
</html>
