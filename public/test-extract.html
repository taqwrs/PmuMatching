<!DOCTYPE html>
<html>
<body style="font-family:sans-serif; padding:20px;">
  <h3>สกัดข้อมูลแหล่งทุน</h3>

  <label>URL แหล่งทุน (ไม่บังคับ)</label><br>
  <input
    id="url"
    style="width:500px; padding:8px; margin-bottom:15px;"
    placeholder="https://nriis.go.th/home/news/"
  /><br>

  <label>เลือกวิธีใส่ข้อมูลกรอบโจทย์</label><br>
  <div style="margin:10px 0; display:flex; gap:10px;">
    <button
      onclick="setMode('text')"
      id="btn-text"
      style="padding:8px 16px; background:#0284c7; color:white; border:none; border-radius:6px; cursor:pointer;"
    >
      วางข้อความ
    </button>

    <button
      onclick="setMode('file')"
      id="btn-file"
      style="padding:8px 16px; background:#e2e8f0; color:black; border:none; border-radius:6px; cursor:pointer;"
    >
      แนบไฟล์ TXT
    </button>
  </div>

  <div id="mode-text">
    <textarea
      id="content"
      style="width:500px; height:180px; padding:8px;"
      placeholder="คัดลอกเนื้อหากรอบโจทย์มาวางที่นี่..."
    ></textarea>
  </div>

  <div id="mode-file" style="display:none;">
    <div
      id="dropzone"
      style="width:500px; border:2px dashed #cbd5e1; padding:30px; text-align:center; border-radius:8px; cursor:pointer; background:#f8fafc;"
    >
      คลิกเพื่อเลือกไฟล์ หรือลากไฟล์มาวางที่นี่<br>
      <small style="color:#64748b;">รองรับไฟล์ TXT ขนาดไม่เกิน 5 MB</small>
    </div>

    <input
      type="file"
      id="fileInput"
      accept=".txt,text/plain"
      style="display:none;"
    >

    <p id="filename" style="color:#0284c7; margin-top:8px;"></p>
  </div>

  <br>

  <button
    onclick="extract()"
    style="padding:10px 24px; background:#0284c7; color:white; border:none; border-radius:6px; cursor:pointer; margin-top:10px;"
  >
    สกัดข้อมูล
  </button>

  <pre
    id="result"
    style="margin-top:20px; background:#f5f5f5; padding:15px; border-radius:8px; white-space:pre-wrap;"
  ></pre>

  <script>
    let fileBase64 = ''
    let fileType = ''

    const MAX_FILE_SIZE = 5 * 1024 * 1024

    function setMode(mode) {
      const isTextMode = mode === 'text'

      document.getElementById('mode-text').style.display = isTextMode ? 'block' : 'none'
      document.getElementById('mode-file').style.display = isTextMode ? 'none' : 'block'

      document.getElementById('btn-text').style.background = isTextMode ? '#0284c7' : '#e2e8f0'
      document.getElementById('btn-text').style.color = isTextMode ? 'white' : 'black'

      document.getElementById('btn-file').style.background = isTextMode ? '#e2e8f0' : '#0284c7'
      document.getElementById('btn-file').style.color = isTextMode ? 'black' : 'white'
    }

    document.getElementById('dropzone').addEventListener('click', () => {
      document.getElementById('fileInput').click()
    })

    document.getElementById('dropzone').addEventListener('dragover', (event) => {
      event.preventDefault()
      event.currentTarget.style.borderColor = '#0284c7'
      event.currentTarget.style.background = '#f0f9ff'
    })

    document.getElementById('dropzone').addEventListener('dragleave', (event) => {
      event.currentTarget.style.borderColor = '#cbd5e1'
      event.currentTarget.style.background = '#f8fafc'
    })

    document.getElementById('dropzone').addEventListener('drop', (event) => {
      event.preventDefault()
      event.currentTarget.style.borderColor = '#cbd5e1'
      event.currentTarget.style.background = '#f8fafc'

      const file = event.dataTransfer.files[0]

      if (file) {
        readFile(file)
      }
    })

    document.getElementById('fileInput').addEventListener('change', (event) => {
      const file = event.target.files[0]

      if (file) {
        readFile(file)
      }
    })

    function readFile(file) {
      const isTextFile =
        file.type === 'text/plain' ||
        file.name.toLowerCase().endsWith('.txt')

      if (!isTextFile) {
        alert('ขณะนี้รองรับเฉพาะไฟล์ TXT เท่านั้น')
        return
      }

      if (file.size > MAX_FILE_SIZE) {
        alert('ไฟล์มีขนาดใหญ่เกิน 5 MB')
        return
      }

      document.getElementById('filename').textContent = `ไฟล์: ${file.name}`

      fileType = 'text/plain'
      fileBase64 = ''

      const reader = new FileReader()

      reader.onload = (event) => {
        fileBase64 = event.target.result.split(',')[1]
      }

      reader.onerror = () => {
        fileBase64 = ''
        fileType = ''
        document.getElementById('filename').textContent = ''
        alert('ไม่สามารถอ่านไฟล์ได้')
      }

      reader.readAsDataURL(file)
    }

    async function extract() {
      const url = document.getElementById('url').value.trim()
      const content = document.getElementById('content').value.trim()
      const isFileMode = document.getElementById('mode-file').style.display !== 'none'
      const resultElement = document.getElementById('result')

      const body = { url }

      if (isFileMode && fileBase64) {
        body.fileBase64 = fileBase64
        body.fileType = fileType || 'text/plain'
      } else if (!isFileMode && content) {
        body.content = content
      }

      if (!body.url && !body.content && !body.fileBase64) {
        alert('กรุณาใส่ URL วางข้อความ หรือแนบไฟล์ TXT')
        return
      }

      resultElement.textContent = 'กำลังวิเคราะห์...'

      try {
        const response = await fetch('/api/funding/extract', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        })

        const data = await response.json()

        if (!response.ok || !data.success) {
          resultElement.textContent = `เกิดข้อผิดพลาด: ${data.error || 'ไม่สามารถสกัดข้อมูลได้'}`
          return
        }

        resultElement.textContent = JSON.stringify(data, null, 2)
      } catch (error) {
        resultElement.textContent = `เกิดข้อผิดพลาดในการเชื่อมต่อ: ${error.message}`
      }
    }
  </script>
</body>
</html>
